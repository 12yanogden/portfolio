<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryan's Portfolio</title>
    <script defer src="https://unpkg.com/alpinejs-component@latest/dist/component.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body>
    <p>before</p>
    <div x-data="{
        people: [
          { name: 'John', age: '25', skills: ['JavaScript', 'CSS'] },
          { name: 'Jane', age: '30', skills: ['Laravel', 'MySQL', 'jQuery'] }
        ]
      }">
        <ul>
            <template x-for="person in people">
                <x-component url="./public/person.html" x-data="{ item: person }"></x-component>
            </template>
        </ul>
    </div>
    <p>---</p>
    <x-component url="./components/test.html"></x-component>
    <p>---</p>
    <div>
        <x-component url="./public/test.html" />
    </div>
    <p>after</p>
</body>

</html>
